plugins {
    id 'base'
    id 'java-library'
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.9.3'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.3'

    implementation 'com.googlecode.json-simple:json-simple:1.1.1'
    api 'org.processing:processing-core:4.3.2'
    api 'oscP5:oscP5:0.9.9'
    implementation 'controlP5:controlP5:2.2.5'  // 2.2.7 available?
}

base {
    archivesName = 'muse-lib'
}

group = 'edu.purdue.jtk'
version = '1.0.0'
